<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA | Sorgu Paneli</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg: #0a0c14;
            --bg-card: #141824;
            --bg-hover: #1e2230;
            --accent: #6366f1;
            --text: #ffffff;
            --text-secondary: #a0a8c0;
            --border: #262b3d;
            --success: #10b981;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: 0.5s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 12px 20px;
            background: rgba(10, 12, 20, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hamburger {
            width: 36px;
            height: 36px;
            background: var(--bg-card);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            border: 1px solid var(--border);
        }

        .hamburger span {
            width: 18px;
            height: 2px;
            background: var(--text);
            transition: 0.3s;
        }

        .menu-panel {
            position: fixed;
            top: 0;
            right: -280px;
            width: 260px;
            height: 100%;
            background: var(--bg-card);
            border-left: 1px solid var(--border);
            z-index: 999;
            transition: 0.3s;
            overflow-y: auto;
        }

        .menu-panel.active {
            right: 0;
        }

        .menu-header {
            padding: 60px 15px 15px;
            border-bottom: 1px solid var(--border);
        }

        .menu-content {
            padding: 15px;
        }

        .menu-item {
            padding: 8px 12px;
            background: var(--bg);
            border-radius: 6px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
            font-size: 12px;
        }

        .menu-item:hover {
            background: var(--bg-hover);
            border-color: var(--accent);
        }

        .main-content {
            margin-top: 70px;
            padding: 20px;
        }

        .hero {
            text-align: center;
            padding: 30px 15px;
        }

        .hero h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .queries-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }

        .query-card {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: 0.2s;
        }

        .query-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .query-icon {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }

        .query-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .query-form {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
            max-width: 400px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            margin-bottom: 4px;
            color: var(--text-secondary);
        }

        .form-control {
            width: 100%;
            padding: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 13px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .result-box {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            border: 1px solid var(--border);
        }

        .result-item {
            padding: 8px;
            background: var(--bg);
            border-radius: 6px;
            margin-bottom: 4px;
            font-size: 12px;
        }

        .result-item strong {
            color: var(--accent);
            min-width: 100px;
            display: inline-block;
        }

        .error-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            border-radius: 6px;
            padding: 12px;
            color: #ef4444;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading">
        <div class="loading-logo">
            <i class="fas fa-bolt"></i>
        </div>
    </div>

    <nav class="navbar">
        <div class="logo">ULTRA PANEL</div>
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <div class="menu-panel" id="menuPanel">
        <div class="menu-header">
            <h4 style="font-size: 13px;">🔍 SORGULAR</h4>
        </div>
        <div class="menu-content" id="menuContent"></div>
    </div>

    <div class="main-content" id="mainContent"></div>

    <script>
        // ==================== KONFİGÜRASYON ====================
        const PROXY_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:3000/proxy?url=' 
            : 'https://sizin-proxy-adiniz.onrender.com/proxy?url='; // RENDER'DAKİ PROXY URL'İNİZİ YAZIN

        const API = {
            sckizm: { base: 'https://api.sckizm.shop/api' },
            punisher: { base: 'https://punisherapi.alwaysdata.net' }
        };

        const SORGULAR = [
            { id: 'tc_eski', ad: 'TC Basic', api: 'sckizm', path: '/tc', param: 'tc', kategori: 'TC' },
            { id: 'tcpro', ad: 'TC PRO', api: 'punisher', path: '/api/subnetdevil/tcpro.php', param: 'tc', kategori: 'TC' },
            { id: 'tcgsm_eski', ad: 'TC/GSM', api: 'sckizm', path: '/tcgsm', param: 'tc', kategori: 'TC' },
            { id: 'adsoyad_eski', ad: 'Ad Soyad', api: 'sckizm', path: '/adsoyad', params: ['ad', 'soyad'], kategori: 'Ad Soyad' },
            { id: 'adsoyadpro', ad: 'Ad Soyad PRO', api: 'punisher', path: '/apiservices/adsoyadpro.php', params: ['ad', 'soyad', 'il'], kategori: 'Ad Soyad' },
            { id: 'aile_eski', ad: 'TC Aile', api: 'sckizm', path: '/aile', param: 'tc', kategori: 'Aile' },
            { id: 'ailepro', ad: 'Aile PRO', api: 'punisher', path: '/api/subnetdevil/ailepro.php', param: 'tc', kategori: 'Aile' },
            { id: 'sulale_eski', ad: 'TC Sülale', api: 'sckizm', path: '/sulale', param: 'tc', kategori: 'Aile' },
            { id: 'adres_eski', ad: 'TC Adres', api: 'sckizm', path: '/adres', param: 'tc', kategori: 'Adres' },
            { id: 'adres', ad: 'Adres Yeni', api: 'punisher', path: '/api/subnetdevil/adres.php', param: 'tc', kategori: 'Adres' },
            { id: 'gsmtc_eski', ad: 'GSM/TC', api: 'sckizm', path: '/gsmtc', param: 'gsm', kategori: 'GSM' },
            { id: 'operator_eski', ad: 'Operatör', api: 'sckizm', path: '/operator', param: 'gsm', kategori: 'GSM' },
            { id: 'gncloperator', ad: 'Güncel Op', api: 'punisher', path: '/api/subnetdevil/gncloperator.php', param: 'gsm', kategori: 'GSM' },
            { id: 'iban', ad: 'IBAN', api: 'punisher', path: '/apiservices/iban.php', param: 'iban', kategori: 'Diğer' }
        ];

        // ==================== MENÜ ====================
        function menuOlustur() {
            const menu = document.getElementById('menuContent');
            const kategoriler = [...new Set(SORGULAR.map(s => s.kategori))];
            
            let html = '';
            kategoriler.forEach(kat => {
                html += `<div style="margin-bottom: 15px;">`;
                html += `<div style="font-size: 10px; color: var(--text-secondary); margin-bottom: 5px;">${kat}</div>`;
                
                SORGULAR.filter(s => s.kategori === kat).forEach(s => {
                    html += `<div class="menu-item" onclick="formGoster('${s.id}')">
                        <i class="fas fa-search"></i> ${s.ad}
                    </div>`;
                });
                
                html += `</div>`;
            });
            
            menu.innerHTML = html;
        }

        // ==================== ANA SAYFA ====================
        function anaSayfa() {
            document.getElementById('mainContent').innerHTML = `
                <div class="hero">
                    <h1>ULTRA SORGU PANELİ</h1>
                    <p style="color: var(--text-secondary); font-size: 13px;">${SORGULAR.length} sorgu • Kendi proxy sunucusu • %100 çalışıyor</p>
                </div>
                <h2 style="font-size: 14px; margin: 15px 0;">📌 Popüler Sorgular</h2>
                <div class="queries-grid">
                    ${SORGULAR.filter(s => s.id.includes('pro')).map(s => `
                        <div class="query-card" onclick="formGoster('${s.id}')">
                            <div class="query-icon"><i class="fas fa-bolt"></i></div>
                            <div class="query-title">${s.ad}</div>
                            <div style="font-size: 10px; color: var(--text-secondary);">${s.kategori}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // ==================== FORM GÖSTER ====================
        function formGoster(id) {
            const sorgu = SORGULAR.find(s => s.id === id);
            if (!sorgu) return;

            document.getElementById('hamburger').classList.remove('active');
            document.getElementById('menuPanel').classList.remove('active');

            let inputs = '';
            if (sorgu.param) {
                inputs = `<div class="form-group">
                    <label>${sorgu.param.toUpperCase()}</label>
                    <input type="text" class="form-control" id="param1" placeholder="${sorgu.param} girin" required>
                </div>`;
            } else if (sorgu.params) {
                sorgu.params.forEach((p, i) => {
                    inputs += `<div class="form-group">
                        <label>${p.toUpperCase()}</label>
                        <input type="text" class="form-control" id="param${i+1}" placeholder="${p} girin" required>
                    </div>`;
                });
            }

            document.getElementById('mainContent').innerHTML = `
                <div class="query-form">
                    <h3 style="margin-bottom: 15px; font-size: 16px;">🔍 ${sorgu.ad}</h3>
                    <form id="sorguForm" onsubmit="event.preventDefault(); sorgula('${id}')">
                        ${inputs}
                        <button type="submit" class="btn">SORGULA</button>
                    </form>
                    <div id="sonuc"></div>
                </div>
            `;
        }

        // ==================== SORGU ÇALIŞTIR (PROXY ÜZERİNDEN) ====================
        async function sorgula(id) {
            const sorgu = SORGULAR.find(s => s.id === id);
            if (!sorgu) return;

            // Parametreleri hazırla
            let params = {};
            if (sorgu.param) {
                const deger = document.getElementById('param1').value.trim();
                if (!deger) return alert('Değer girin');
                params[sorgu.param] = deger;
            } else if (sorgu.params) {
                for (let i = 0; i < sorgu.params.length; i++) {
                    const deger = document.getElementById(`param${i+1}`).value.trim();
                    if (!deger) return alert('Tüm alanları doldurun');
                    params[sorgu.params[i]] = deger;
                }
            }

            // URL oluştur
            const apiUrl = API[sorgu.api].base + sorgu.path;
            const queryString = new URLSearchParams(params).toString();
            const fullUrl = `${apiUrl}?${queryString}`;
            
            // Proxy'den istek yap
            const proxyUrl = PROXY_URL + encodeURIComponent(fullUrl);

            document.getElementById('sonuc').innerHTML = '<div class="loading">Sorgulanıyor...</div>';

            try {
                const response = await fetch(proxyUrl);
                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                // Sonucu göster
                let html = '<div class="result-box">';
                
                if (Array.isArray(data)) {
                    data.forEach((item, idx) => {
                        html += `<div style="margin: 5px 0; color: var(--accent);">#${idx+1}</div>`;
                        for (const [k, v] of Object.entries(item)) {
                            if (v && v !== 'null') {
                                html += `<div class="result-item"><strong>${k}:</strong> ${v}</div>`;
                            }
                        }
                    });
                } else if (typeof data === 'object') {
                    for (const [k, v] of Object.entries(data)) {
                        if (v && v !== 'null' && typeof v !== 'object') {
                            html += `<div class="result-item"><strong>${k}:</strong> ${v}</div>`;
                        }
                    }
                } else {
                    html += `<div class="result-item">${data}</div>`;
                }
                
                html += '</div>';
                document.getElementById('sonuc').innerHTML = html;

            } catch (error) {
                document.getElementById('sonuc').innerHTML = `
                    <div class="error-box">
                        ❌ Hata: ${error.message}<br>
                        <small>Proxy: ${PROXY_URL}</small>
                    </div>
                `;
            }
        }

        // ==================== HAMBURGER ====================
        document.getElementById('hamburger').addEventListener('click', function() {
            this.classList.toggle('active');
            document.getElementById('menuPanel').classList.toggle('active');
        });

        // ==================== BAŞLANGIÇ ====================
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 1000);
            menuOlustur();
            anaSayfa();
        });
    </script>
</body>
</html>
