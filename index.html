        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg: #03050a;
            --bg-card: #0f1219;
            --bg-hover: #1a1f2c;
            --accent: #ef4444;
            --accent-glow: rgba(239, 68, 68, 0.4);
            --text: #ffffff;
            --text-secondary: #9ca3af;
            --border: #1f2937;
            --success: #10b981;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            opacity: 0;
            animation: bodyFadeIn 1s ease forwards;
        }

        @keyframes bodyFadeIn {
            to { opacity: 1; }
        }

        /* ==================== CLOUDFREE KORUMASI ==================== */
        .cloudfree-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0f1219 0%, #03050a 100%);
            backdrop-filter: blur(30px);
            z-index: 999999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 1.2s cubic-bezier(0.87, 0, 0.13, 1);
            animation: overlayGlow 3s infinite alternate;
        }

        @keyframes overlayGlow {
            from { box-shadow: inset 0 0 50px rgba(239,68,68,0.1); }
            to { box-shadow: inset 0 0 100px rgba(239,68,68,0.3); }
        }

        .cloudfree-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            backdrop-filter: blur(0px);
        }

        .cloudfree-box {
            background: var(--bg-card);
            border: 3px solid var(--accent);
            border-radius: 60px;
            padding: 70px 50px;
            text-align: center;
            max-width: 520px;
            width: 90%;
            box-shadow: 0 0 100px var(--accent-glow);
            animation: boxFloat 4s infinite ease-in-out;
            transform-origin: center;
        }

        @keyframes boxFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.02); }
        }

        .cloudfree-logo {
            font-size: 80px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), #fbbf24, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            letter-spacing: 6px;
            animation: textShine 3s infinite;
            background-size: 200% auto;
        }

        @keyframes textShine {
            to { background-position: 200% center; }
        }

        .cloudfree-badge {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(239,68,68,0.1);
            border: 1px solid var(--accent);
            border-radius: 40px;
            font-size: 13px;
            color: var(--accent);
            margin-bottom: 25px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* ==================== NAVBAR ==================== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 18px 35px;
            background: rgba(3,5,10,0.95);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transform: translateY(-100%);
            animation: slideDown 0.8s 0.5s forwards;
        }

        @keyframes slideDown {
            to { transform: translateY(0); }
        }

        .logo {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
            position: relative;
        }

        .logo::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            animation: logoLine 1s 1s forwards;
        }

        @keyframes logoLine {
            to { width: 100%; }
        }

        .hamburger {
            width: 52px;
            height: 52px;
            background: var(--bg-card);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: 0.3s;
        }

        .hamburger:hover {
            border-color: var(--accent);
            transform: scale(1.05);
        }

        .hamburger span {
            width: 26px;
            height: 2px;
            background: var(--text);
            transition: 0.3s;
        }

        .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(7px, 7px); background: var(--accent); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(7px, -7px); background: var(--accent); }

        /* ==================== MENÜ ==================== */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 998;
            opacity: 0;
            visibility: hidden;
            transition: 0.4s;
        }

        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .menu-panel {
            position: fixed;
            top: 0;
            right: -380px;
            width: 340px;
            height: 100%;
            background: var(--bg-card);
            border-left: 2px solid var(--border);
            z-index: 999;
            transition: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow-y: auto;
        }

        .menu-panel.active {
            right: 0;
        }

        .menu-header {
            padding: 90px 25px 25px;
            border-bottom: 2px solid var(--border);
        }

        .menu-header h3 {
            color: var(--accent);
            font-size: 16px;
            letter-spacing: 3px;
            font-weight: 600;
        }

        .menu-content {
            padding: 25px;
        }

        .menu-item {
            padding: 15px 18px;
            background: var(--bg);
            border-radius: 14px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 8px;
            font-weight: 500;
            transform: translateX(0);
        }

        .menu-item:hover {
            background: var(--bg-hover);
            border-color: var(--accent);
            transform: translateX(-5px);
        }

        .menu-item i {
            width: 22px;
            color: var(--accent);
            font-size: 16px;
        }

        /* ==================== MAIN CONTENT ==================== */
        .main-content {
            margin-top: 100px;
            padding: 25px 35px;
            opacity: 0;
            animation: contentFade 0.8s 0.8s forwards;
        }

        @keyframes contentFade {
            to { opacity: 1; }
        }

        /* ==================== HERO ==================== */
        .hero {
            text-align: center;
            padding: 50px 20px;
            transform: translateY(30px);
            animation: heroUp 1s 1s forwards;
            opacity: 0;
        }

        @keyframes heroUp {
            to { transform: translateY(0); opacity: 1; }
        }

        .hero h1 {
            font-size: 56px;
            font-weight: 900;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255,255,255,0.1);
        }

        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin-top: 40px;
        }

        .stat-item {
            animation: statPop 0.5s forwards;
            opacity: 0;
            transform: scale(0.8);
        }

        .stat-item:nth-child(1) { animation-delay: 1.2s; }
        .stat-item:nth-child(2) { animation-delay: 1.4s; }
        .stat-item:nth-child(3) { animation-delay: 1.6s; }

        @keyframes statPop {
            to { opacity: 1; transform: scale(1); }
        }

        .stat-number {
            font-size: 42px;
            font-weight: 800;
            color: var(--accent);
            display: block;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        /* ==================== SORGU KARTLARI ==================== */
        .queries-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .query-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 22px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: 0.3s;
            opacity: 0;
            transform: translateY(30px);
            animation: cardSlide 0.5s forwards;
        }

        .query-card:nth-child(1) { animation-delay: 1.7s; }
        .query-card:nth-child(2) { animation-delay: 1.9s; }
        .query-card:nth-child(3) { animation-delay: 2.1s; }

        @keyframes cardSlide {
            to { opacity: 1; transform: translateY(0); }
        }

        .query-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 30px var(--accent-glow);
        }

        .query-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent), #fbbf24);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            animation: iconSpin 5s infinite linear;
        }

        @keyframes iconSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .query-icon i {
            font-size: 22px;
            color: white;
        }

        /* ==================== FORM ==================== */
        .query-form {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 35px;
            border: 1px solid var(--border);
            max-width: 500px;
            margin: 0 auto;
            animation: formGlow 3s infinite alternate;
        }

        @keyframes formGlow {
            from { box-shadow: 0 0 20px rgba(239,68,68,0.1); }
            to { box-shadow: 0 0 40px rgba(239,68,68,0.3); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 15px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text);
            font-size: 15px;
            transition: 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent), #fbbf24);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px var(--accent-glow);
        }

        /* ==================== SONUÇ ==================== */
        .result-box {
            background: var(--bg-card);
            border-radius: 25px;
            padding: 25px;
            margin-top: 25px;
            border: 1px solid var(--border);
            animation: resultSlide 0.5s;
        }

        @keyframes resultSlide {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border);
        }

        .result-actions {
            display: flex;
            gap: 12px;
        }

        .result-actions button {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 15px;
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result-actions button:hover {
            border-color: var(--accent);
            background: var(--bg-hover);
            transform: scale(1.05);
        }

        .result-item {
            padding: 12px;
            background: var(--bg);
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
            font-size: 14px;
            transition: 0.2s;
        }

        .result-item:hover {
            border-color: var(--accent);
            transform: translateX(5px);
        }

        .result-item strong {
            color: var(--accent);
            min-width: 130px;
            display: inline-block;
        }

        /* ==================== TOAST ==================== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(150px);
            background: var(--bg-card);
            border: 2px solid var(--accent);
            border-radius: 50px;
            padding: 15px 30px;
            font-size: 14px;
            font-weight: 600;
            z-index: 99999;
            transition: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 30px var(--accent-glow);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast i {
            color: var(--success);
            font-size: 18px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
        }

        .loading i {
            font-size: 45px;
            color: var(--accent);
            animation: loadingSpin 1.5s infinite linear;
        }

        @keyframes loadingSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .error-box {
            background: rgba(239,68,68,0.1);
            border: 1px solid var(--accent);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            color: var(--accent);
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar { padding: 15px 20px; }
            .logo { font-size: 24px; }
            .hero h1 { font-size: 36px; }
            .hero-stats { flex-direction: column; gap: 20px; }
        }
    </style>
</head>

            { id: 'gncloperator', ad: '📱 Güncel Op', api: 'https://punisherapi.alwaysdata.net/apiservices/gncloperator.php', param: 'numara', kategori: 'GSM' },
            { id: 'tcgsm', ad: '📞 TC/GSM', api: 'https://punisherapi.alwaysdata.net/apiservices/tcgsm.php', param: 'tc', kategori: 'GSM' },
            { id: 'gsmtc', ad: '📲 GSM/TC', api: 'https://punisherapi.alwaysdata.net/apiservices/gsmtc.php', param: 'gsm', kategori: 'GSM' }
        ];

        // ==================== REKLAM TEMİZLEME ====================
        function temizle(data) {
            if (!data) return null;
            
            const reklam = ['success','message','developer','version','timestamp','type','time','elapsed'];
            
            if (Array.isArray(data)) {
                return data.map(item => temizle(item)).filter(i => i !== null);
            }
            
            if (typeof data === 'object') {
                if (data.results) return temizle(data.results);
                
                const yeni = {};
                for (const [k, v] of Object.entries(data)) {
                    if (!reklam.includes(k.toLowerCase())) {
                        if (v && v !== 'null') {
                            if (typeof v === 'object') {
                                const t = temizle(v);
                                if (t && Object.keys(t).length > 0) yeni[k] = t;
                            } else {
                                yeni[k] = v;
                            }
                        }
                    }
                }
                return Object.keys(yeni).length > 0 ? yeni : null;
            }
            return data;
        }

        // ==================== SÜPER GÜÇLÜ API (SINIRSIZ TIMEOUT) ====================
        async function superIstek(url, params, deneme = 0) {
            const query = new URLSearchParams(params).toString();
            const fullUrl = `${url}?${query}`;
            
            const proxyIndex = Math.min(deneme, PROXY_LIST.length - 1);
            const proxy = PROXY_LIST[proxyIndex];
            const requestUrl = proxy ? proxy + encodeURIComponent(fullUrl) : fullUrl;
            const userAgent = USER_AGENTS[Math.floor(Math.random() * USER_AGENTS.length)];

            const controller = new AbortController();
            // SINIRSIZ TIMEOUT - hiç iptal etme
            // const timeoutId = setTimeout(() => controller.abort(), 30000);

            try {
                const response = await fetch(requestUrl, {
                    signal: controller.signal,
                    headers: {
                        'User-Agent': userAgent,
                        'Accept': 'application/json',
                        'Origin': window.location.origin,
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                });
                
                // clearTimeout(timeoutId);
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const text = await response.text();
                let data;
                try {
                    data = JSON.parse(text);
                } catch {
                    data = { sonuc: text };
                }
                
                const temiz = temizle(data);
                if (!temiz) throw new Error('Veri bulunamadı');
                
                return temiz;
                
            } catch (error) {
                // clearTimeout(timeoutId);
                
                if (deneme < PROXY_LIST.length - 1) {
                    await new Promise(r => setTimeout(r, 300));
                    return superIstek(url, params, deneme + 1);
                }
                
                throw error;
            }
        }

        // ==================== TOAST ====================
        function showToast(msg) {
            document.getElementById('toastMessage').textContent = msg;
            document.getElementById('toast').classList.add('show');
            setTimeout(() => document.getElementById('toast').classList.remove('show'), 2000);
        }

        // ==================== MENÜ ====================
        function menuOlustur() {
            const menu = document.getElementById('menuContent');
            const kategoriler = [...new Set(SORGULAR.map(s => s.kategori))];
            
            let html = '';
            kategoriler.forEach(kat => {
                html += `<div style="margin-bottom: 20px;"><div style="font-size: 11px; color: var(--text-secondary); margin-bottom: 8px;">${kat}</div>`;
                SORGULAR.filter(s => s.kategori === kat).forEach(s => {
                    html += `<div class="menu-item" onclick="formGoster('${s.id}')">`;
                    html += `<i class="fas fa-search"></i> ${s.ad.replace(/[🔴🔥🔵⚡👪👑📍🏦📱📞📲]/g, '')}`;
                    html += `</div>`;
                });
                html += `</div>`;
            });
            
            menu.innerHTML = html;
        }

        // ==================== ANA SAYFA ====================
        function anaSayfa() {
            document.getElementById('mainContent').innerHTML = `
                <div class="hero">
                    <h1>DOXBİN ULTRA</h1>
                    <p style="color: var(--text-secondary);">11 sorgu • 50+ proxy • sınırsız hız</p>
                    <div class="hero-stats">
                        <div class="stat-item"><span class="stat-number">11</span><span class="stat-label">SORGU</span></div>
                        <div class="stat-item"><span class="stat-number">50+</span><span class="stat-label">PROXY</span></div>
                        <div class="stat-item"><span class="stat-number">∞</span><span class="stat-label">HIZ</span></div>
                    </div>
                </div>
                
                <h2 style="margin: 30px 0 15px; font-size: 18px; display: flex; align-items: center; gap: 10px;">
                    <i class="fas fa-bolt" style="color: var(--accent);"></i> POPÜLER SORGULAR
                </h2>
                <div class="queries-grid">
                    ${SORGULAR.filter(s => s.populer).map(s => `
                        <div class="query-card" onclick="formGoster('${s.id}')">
                            <div class="query-icon"><i class="fas fa-search"></i></div>
                            <div class="query-title">${s.ad}</div>
                            <div style="font-size: 11px; color: var(--text-secondary);">${s.kategori}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // ==================== FORM ====================
        function formGoster(id) {
            const sorgu = SORGULAR.find(s => s.id === id);
            if (!sorgu) return;
            
            // Menüyü kapat
            document.getElementById('hamburger').classList.remove('active');
            document.getElementById('menuPanel').classList.remove('active');
            document.getElementById('menuOverlay').classList.remove('active');

            let inputs = '';
            if (sorgu.param) {
                inputs = `
                    <div class="form-group">
                        <label>${sorgu.param.toUpperCase()}</label>
                        <input type="text" class="form-control" id="param1" placeholder="${sorgu.param} girin" required>
                    </div>
                `;
            } else if (sorgu.params) {
                sorgu.params.forEach((p, i) => {
                    inputs += `
                        <div class="form-group">
                            <label>${p.toUpperCase()}</label>
                            <input type="text" class="form-control" id="param${i+1}" placeholder="${p} girin" required>
                        </div>
                    `;
                });
            }

            document.getElementById('mainContent').innerHTML = `
                <div class="query-form">
                    <h3 style="margin-bottom: 20px;">${sorgu.ad}</h3>
                    <form id="sorguForm" onsubmit="event.preventDefault(); sorgula('${sorgu.id}')">
                        ${inputs}
                        <button type="submit" class="btn">SORGULA</button>
                    </form>
                    <div id="sonuc"></div>
                </div>
            `;
        }

        // ==================== SORGULA ====================
        async function sorgula(id) {
            const sorgu = SORGULAR.find(s => s.id === id);
            if (!sorgu) return;

            const params = {};
            if (sorgu.param) {
                const deger = document.getElementById('param1').value.trim();
                if (!deger) return showToast('❌ Değer girin');
                params[sorgu.param] = deger;
            } else if (sorgu.params) {
                for (let i = 0; i < sorgu.params.length; i++) {
                    const deger = document.getElementById(`param${i+1}`).value.trim();
                    if (!deger) return showToast('❌ Tüm alanları doldurun');
                    params[sorgu.params[i]] = deger;
                }
            }

            document.getElementById('sonuc').innerHTML = '<div class="loading"><i class="fas fa-circle-notch"></i><p style="margin-top: 15px;">50+ proxy deneniyor...</p></div>';

            try {
                const sonuc = await superIstek(sorgu.api, params);
                
                let sonucText = '';
                let html = '<div class="result-box">';
                html += '<div class="result-header"><h4>📊 SONUÇ</h4>';
                html += '<div class="result-actions">';
                html += '<button onclick="copyResult()"><i class="fas fa-copy"></i> KOPYALA</button>';
                html += '<button onclick="downloadTxt()"><i class="fas fa-download"></i> TXT</button>';
                html += '<button onclick="shareResult()"><i class="fas fa-share"></i> PAYLAŞ</button>';
                html += '</div></div>';
                
                if (Array.isArray(sonuc)) {
                    sonuc.forEach((item, idx) => {
                        html += `<h5 style="margin: 15px 0 10px; color: var(--accent);">#${idx+1}</h5>`;
                        sonucText += `#${idx+1}\n`;
                        for (const [k, v] of Object.entries(item)) {
                            if (v && v !== 'null') {
                                html += `<div class="result-item"><strong>${k}:</strong> ${v}</div>`;
                                sonucText += `${k}: ${v}\n`;
                            }
                        }
                        sonucText += '\n';
                    });
                } else if (typeof sonuc === 'object') {
                    for (const [k, v] of Object.entries(sonuc)) {
                        if (v && v !== 'null' && typeof v !== 'object') {
                            html += `<div class="result-item"><strong>${k}:</strong> ${v}</div>`;
                            sonucText += `${k}: ${v}\n`;
                        }
                    }
                } else {
                    html += `<div class="result-item">${sonuc}</div>`;
                    sonucText += sonuc;
                }
                
                html += '</div>';
                document.getElementById('sonuc').innerHTML = html;
                
                window.sonucText = sonucText;
                showToast('✅ Sorgu tamamlandı!');
                
            } catch (error) {
                document.getElementById('sonuc').innerHTML = `
                    <div class="error-box">
                        ❌ HATA: ${error.message}<br>
                        <small>50 proxy denendi, sonuç alınamadı.</small>
                    </div>
                `;
            }
        }

        // ==================== KOPYALAMA ====================
        window.copyResult = function() {
            if (window.sonucText) {
                navigator.clipboard.writeText(window.sonucText);
                showToast('✅ Kopyalandı!');
            }
        };

        // ==================== TXT İNDİR ====================
        window.downloadTxt = function() {
            if (window.sonucText) {
                const blob = new Blob([window.sonucText], { type: 'text/plain' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `DOXBIN_${Date.now()}.txt`;
                a.click();
                showToast('✅ TXT indiriliyor...');
            }
        };

        // ==================== PAYLAŞ ====================
        window.shareResult = function() {
            if (window.sonucText && navigator.share) {
                navigator.share({
                    title: 'DOXBİN Sonuç',
                    text: window.sonucText
                }).catch(() => {});
            } else {
                showToast('📋 Paylaşım desteklenmiyor');
            }
        };

        // ==================== HAMBURGER ====================
        const hamburger = document.getElementById('hamburger');
        const menuPanel = document.getElementById('menuPanel');
        const menuOverlay = document.getElementById('menuOverlay');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            menuPanel.classList.toggle('active');
            menuOverlay.classList.toggle('active');
        });

        menuOverlay.addEventListener('click', () => {
            hamburger.classList.remove('active');
            menuPanel.classList.remove('active');
            menuOverlay.classList.remove('active');
        });

        // ==================== BAŞLANGIÇ ====================
        window.addEventListener('load', () => {
            menuOlustur();
            anaSayfa();
        });
    </script>
</body>
</html>
