        // ==================== REKLAM TEMİZLEME (sürüm, developer vs sil) ====================
        function temizle(data) {
            if (!data) return null;
            
            const reklamAnahtarlari = ['success','message','developer','version','timestamp','type','time','elapsed'];
            
            if (Array.isArray(data)) {
                return data.map(item => temizle(item)).filter(i => i !== null);
            }
            
            if (typeof data === 'object') {
                // results veya data varsa direkt onu al
                if (data.results) return temizle(data.results);
                
                const yeni = {};
                for (const [k, v] of Object.entries(data)) {
                    if (!reklamAnahtarlari.includes(k.toLowerCase())) {
                        if (v && v !== 'null') {
                            if (typeof v === 'object') {
                                const t = temizle(v);
                                if (t && Object.keys(t).length > 0) yeni[k] = t;
                            } else {
                                yeni[k] = v;
                            }
                        }
                    }
                }
                return Object.keys(yeni).length > 0 ? yeni : null;
            }
            
            return data;
        }

        // ==================== SÜPER GÜÇLÜ API İSTEK (50+ PROXY DENER) ====================
        async function superIstek(url, params, deneme = 0) {
            const query = new URLSearchParams(params).toString();
            const fullUrl = `${url}?${query}`;
            
            // Proxy seç (sırayla dene)
            const proxyIndex = Math.min(deneme, PROXY_LIST.length - 1);
            const proxy = PROXY_LIST[proxyIndex];
            
            // Proxy varsa kullan, yoksa direkt
            const requestUrl = proxy ? proxy + encodeURIComponent(fullUrl) : fullUrl;
            
            // Rastgele user-agent
            const userAgent = USER_AGENTS[Math.floor(Math.random() * USER_AGENTS.length)];
            
            console.log(`🔄 Deneme ${deneme+1}/${PROXY_LIST.length}: ${proxy || 'direkt'}`);
            
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 15000);

            try {
                const response = await fetch(requestUrl, {
                    signal: controller.signal,
                    headers: {
                        'User-Agent': userAgent,
                        'Accept': 'application/json',
                        'Origin': window.location.origin,
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                });
                
                clearTimeout(timeoutId);
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const text = await response.text();
                let data;
                try {
                    data = JSON.parse(text);
                } catch {
                    data = { sonuc: text };
                }
                
                const temiz = temizle(data);
                if (!temiz) throw new Error('Veri bulunamadı');
                
                return temiz;
                
            } catch (error) {
                clearTimeout(timeoutId);
                
                // Sonraki proxy'yi dene
                if (deneme < PROXY_LIST.length - 1) {
                    await new Promise(r => setTimeout(r, 500));
                    return superIstek(url, params, deneme + 1);
                }
                
                throw error;
            }
        }

                    </div>
                </div>
                
                <h2 style="margin: 30px 0 15px;">🔥 Popüler Sorgular</h2>
                <div class="queries-grid">
                    ${SORGULAR.filter(s => s.populer).map(s => `
                        <div class="query-card" onclick="formGoster('${s.id}')">
                            <div class="query-icon"><i class="fas fa-bolt"></i></div>
                            <div class="query-title">${s.ad} <span class="verified-badge"><i class="fas fa-check"></i></span></div>
                            <div style="font-size: 11px; color: var(--text-secondary);">${s.kategori}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // ==================== FORM ====================
        function formGoster(id) {
            const sorgu = SORGULAR.find(s => s.id === id);
            if (!sorgu) return;
            
            // Menüyü kapat
            document.getElementById('hamburger').classList.remove('active');
            document.getElementById('menuPanel').classList.remove('active');
            document.getElementById('menuOverlay').classList.remove('active');

            let inputs = '';
            if (sorgu.param) {
                inputs = `
                    <div class="form-group">
                        <label>${sorgu.param.toUpperCase()}</label>
                        <input type="text" class="form-control" id="param1" placeholder="${sorgu.param} girin" required>
                    </div>
                `;
            } else if (sorgu.params) {
                sorgu.params.forEach((p, i) => {
                    inputs += `
                        <div class="form-group">
                            <label>${p.toUpperCase()}</label>
                            <input type="text" class="form-control" id="param${i+1}" placeholder="${p} girin" required>
                        </div>
                    `;
                });
            }

            document.getElementById('mainContent').innerHTML = `
                <div class="query-form">
                    <h3 style="margin-bottom: 20px;">🔍 ${sorgu.ad} <span class="verified-badge"><i class="fas fa-check"></i></span></h3>
                    <form id="sorguForm" onsubmit="event.preventDefault(); sorgula('${sorgu.id}')">
                        ${inputs}
                        <button type="submit" class="btn">SORGULA</button>
                    </form>
                    <div id="sonuc"></div>
                </div>
            `;
        }

        // ==================== SORGULA ====================
        async function sorgula(id) {
            const sorgu = SORGULAR.find(s => s.id === id);
            if (!sorgu) return;

            const params = {};
            if (sorgu.param) {
                const deger = document.getElementById('param1').value.trim();
                if (!deger) return alert('Değer girin');
                params[sorgu.param] = deger;
            } else if (sorgu.params) {
                for (let i = 0; i < sorgu.params.length; i++) {
                    const deger = document.getElementById(`param${i+1}`).value.trim();
                    if (!deger) return alert('Tüm alanları doldurun');
                    params[sorgu.params[i]] = deger;
                }
            }

            document.getElementById('sonuc').innerHTML = '<div class="loading"><i class="fas fa-circle-notch"></i><p>50+ proxy deneniyor...</p></div>';

            try {
                const sonuc = await superIstek(sorgu.api, params);
                
                let sonucText = '';
                let html = '<div class="result-box">';
                html += '<div class="result-header"><h4>📊 SONUÇ</h4>';
                html += '<div class="result-actions">';
                html += '<button onclick="copyResult()"><i class="fas fa-copy"></i></button>';
                html += '<button onclick="downloadTxt()"><i class="fas fa-download"></i></button>';
                html += '</div></div>';
                
                if (Array.isArray(sonuc)) {
                    sonuc.forEach((item, idx) => {
                        html += `<h5 style="margin: 10px 0 5px; color: var(--accent);">#${idx+1}</h5>`;
                        sonucText += `#${idx+1}\n`;
                        for (const [k, v] of Object.entries(item)) {
                            if (v && v !== 'null') {
                                html += `<div class="result-item"><strong>${k}:</strong> ${v}</div>`;
                                sonucText += `${k}: ${v}\n`;
                            }
                        }
                        sonucText += '\n';
                    });
                } else if (typeof sonuc === 'object') {
                    for (const [k, v] of Object.entries(sonuc)) {
                        if (v && v !== 'null' && typeof v !== 'object') {
                            html += `<div class="result-item"><strong>${k}:</strong> ${v}</div>`;
                            sonucText += `${k}: ${v}\n`;
                        }
                    }
                } else {
                    html += `<div class="result-item">${sonuc}</div>`;
                    sonucText += sonuc;
                }
                
                html += '</div>';
                document.getElementById('sonuc').innerHTML = html;
                
                window.sonucText = sonucText;
                
            } catch (error) {
                document.getElementById('sonuc').innerHTML = `
                    <div class="error-box">
                        ❌ HATA: ${error.message}<br>
                        <small>50 proxy denendi, bağlantı kurulamadı.</small>
                    </div>
                `;
            }
        }

        // ==================== KOPYALAMA ====================
        window.copyResult = function() {
            if (window.sonucText) {
                navigator.clipboard.writeText(window.sonucText);
                document.getElementById('toast').classList.add('show');
                setTimeout(() => document.getElementById('toast').classList.remove('show'), 2000);
            }
        };

        // ==================== TXT İNDİR ====================
        window.downloadTxt = function() {
            if (window.sonucText) {
                const blob = new Blob([window.sonucText], { type: 'text/plain' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `sonuc_${Date.now()}.txt`;
                a.click();
            }
        };

        // ==================== MÜZİK KONTROLÜ ====================
        const music = document.getElementById('havhavMusic');
        const musicBtn = document.getElementById('musicBtn');
        let musicPlaying = false;

        musicBtn.addEventListener('click', () => {
            if (musicPlaying) {
                music.pause();
                musicBtn.style.background = 'var(--accent)';
            } else {
                music.play();
                musicBtn.style.background = '#10b981';
            }
            musicPlaying = !musicPlaying;
        });

        // ==================== CLOUDFREE KORUMASI ====================
        window.onCloudfreeSuccess = function() {
            document.getElementById('cloudfreeOverlay').classList.add('hidden');
            // Müziği otomatik başlat (opsiyonel)
            music.play().catch(() => {});
        };

        // ==================== HAMBURGER ====================
        const hamburger = document.getElementById('hamburger');
        const menuPanel = document.getElementById('menuPanel');
        const menuOverlay = document.getElementById('menuOverlay');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            menuPanel.classList.toggle('active');
            menuOverlay.classList.toggle('active');
        });

        menuOverlay.addEventListener('click', () => {
            hamburger.classList.remove('active');
            menuPanel.classList.remove('active');
            menuOverlay.classList.remove('active');
        });

        // ==================== BAŞLANGIÇ ====================
        window.addEventListener('load', () => {
            menuOlustur();
            anaSayfa();
            
            // 3 saniye sonra CloudFree otomatik geçsin (test için)
            setTimeout(() => {
                document.getElementById('cloudfreeOverlay').classList.add('hidden');
            }, 5000);
        });
    </script>
</body>
</html>
